<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Syncly | Premium Classic</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { 
            --p: #1DB954; 
            --bg: #050505; 
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .glow { position: fixed; width: 400px; height: 400px; background: var(--p); filter: blur(150px); opacity: 0.1; z-index: -1; top: -100px; right: -100px; }

        /* ENTRANCE PAGE */
        #entry-page { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: 0.8s var(--ease); }
        .hero-title { font-size: 80px; font-weight: 900; letter-spacing: -4px; background: linear-gradient(to bottom, #fff, #444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .entry-card { background: var(--glass); backdrop-filter: blur(20px); padding: 40px; border-radius: 32px; border: 1px solid var(--glass-border); width: 380px; text-align: center; }

        .aesthetic-input { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 16px 20px; color: white; border-radius: 16px; outline: none; width: -webkit-fill-available; margin-bottom: 12px; font-size: 16px; text-align: center; }
        .aesthetic-input:focus { border-color: var(--p); }

        .btn { border: none; padding: 16px; border-radius: 16px; font-weight: 800; cursor: pointer; transition: 0.3s var(--ease); width: 100%; text-transform: uppercase; letter-spacing: 1px; }
        .primary-btn { background: var(--p); color: black; }
        .secondary-btn { background: transparent; border: 1px solid var(--glass-border); color: white; margin-top: 10px; }

        /* MAIN APP - FIXED SIDE-BY-SIDE */
        #main-app { display: none; height: 100vh; grid-template-columns: 1fr 350px; opacity: 0; transition: 1s ease; }
        .player-side { padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .chat-side { background: rgba(255,255,255,0.01); border-left: 1px solid var(--glass-border); display: flex; flex-direction: column; backdrop-filter: blur(10px); }

        .video-container { flex: 1; position: relative; border-radius: 24px; overflow: hidden; border: 1px solid var(--glass-border); background: #000; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        #player { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

        #messages { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 14px; max-width: 80%; line-height: 1.5; }
        .other-msg { background: var(--glass); border: 1px solid var(--glass-border); align-self: flex-start; }
        .my-msg { background: var(--p); color: black; align-self: flex-end; border-radius: 18px 18px 4px 18px; }
        .system-msg { font-size: 11px; color: #666; align-self: center; text-transform: uppercase; letter-spacing: 1px; }

        #room-id-badge { background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 40px; border: 1px solid var(--glass-border); font-size: 12px; font-weight: 700; color: var(--p); cursor: pointer; }
    </style>
</head>
<body>

    <div class="glow"></div>
    <div id="entry-page">
        <h1 class="hero-title">Syncly</h1>
        <div class="entry-card">
            <input type="text" id="user-name" placeholder="Who are you?" class="aesthetic-input">
            <div style="margin-top: 20px;">
                <button class="btn primary-btn" onclick="initPeer(true)">Create New Vibe</button>
                <div style="margin: 20px; font-size: 10px; color: #444; font-weight: 800; letter-spacing: 2px;">OR</div>
                <input type="text" id="join-input" placeholder="Paste Room ID" class="aesthetic-input">
                <button class="btn secondary-btn" onclick="initPeer(false)">Join Room</button>
            </div>
        </div>
    </div>

    <div id="main-app">
        <div class="player-side">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="font-size: 24px; font-weight: 900;">Syncly<span style="color:var(--p);">.</span></div>
                <div id="room-id-badge" onclick="copyId()">ID: Connecting...</div>
            </div>
            
            <div style="display:flex; gap:10px; background:var(--glass); padding:8px; border-radius:20px; border:1px solid var(--glass-border);">
                <input type="text" id="search-input" placeholder="Search track or paste link..." class="aesthetic-input" style="margin:0; border:none; background:transparent; text-align: left;">
                <button class="btn primary-btn" style="width:100px; padding:12px;" onclick="handlePlay(true)">PLAY</button>
            </div>

            <div class="video-container">
                <div id="player"></div>
            </div>
        </div>

        <div class="chat-side">
            <div style="padding:25px; border-bottom:1px solid var(--glass-border); font-size: 11px; font-weight: 900; letter-spacing: 2px; color: #555;">LIVE CHAT</div>
            <div id="messages"></div>
            <div style="padding:20px; border-top:1px solid var(--glass-border);">
                <input type="text" id="chat-input" placeholder="Message..." class="aesthetic-input" style="margin:0; text-align:left; border-radius: 25px;" onkeypress="if(event.key==='Enter') sendChat()">
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyAaCRqzXizB5wt8iFc7O-yfFvherdJi_-I'; 
        let peer, connections = [], player, isHost = false, myName = "", ignoreNext = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%', videoId: 'jOTfBlKSQ84',
                playerVars: { 'autoplay': 0, 'controls': 1, 'rel': 0, 'playsinline': 1 },
                events: { 'onStateChange': onStateChange }
            });
        }

        function onStateChange(event) {
            if(ignoreNext) { ignoreNext = false; return; }
            if(event.data === YT.PlayerState.PLAYING || event.data === YT.PlayerState.PAUSED) {
                let sync = { type: 'sync', state: event.data, time: player.getCurrentTime() };
                isHost ? broadcast(sync) : (connections[0] && connections[0].send(sync));
            }
        }

        function initPeer(hostMode) {
            myName = document.getElementById('user-name').value.trim();
            if(!myName) return alert("Pehle naam batao!");
            isHost = hostMode;
            const rid = isHost ? Math.random().toString(36).substring(2, 7) : null;
            peer = new Peer(rid);
            peer.on('open', id => {
                document.getElementById('room-id-badge').innerText = "ID: " + id;
                if(!isHost) connectToHost(document.getElementById('join-input').value.trim());
                showApp();
            });
            peer.on('connection', c => { connections.push(c); listen(c); });
        }

        function connectToHost(id) { let c = peer.connect(id); connections.push(c); listen(c); }

        function listen(conn) {
            conn.on('data', data => {
                if(data.type === 'chat') addMsg(data.user, data.val);
                if(data.type === 'play') { player.loadVideoById(data.val); if(isHost) broadcast(data, conn); }
                if(data.type === 'sync') {
                    ignoreNext = true;
                    player.seekTo(data.time);
                    data.state === 1 ? player.playVideo() : player.pauseVideo();
                    if(isHost) broadcast(data, conn);
                }
            });
            conn.on('open', () => conn.send({type: 'chat', user: 'System', val: myName + " joined!"}));
        }

        function broadcast(d, exc) { connections.forEach(c => { if(c.open && c !== exc) c.send(d); }); }

        function showApp() {
            document.getElementById('entry-page').style.transform = "translateY(-100%)";
            setTimeout(() => {
                document.getElementById('entry-page').style.display = "none";
                document.getElementById('main-app').style.display = "grid";
                setTimeout(() => document.getElementById('main-app').style.opacity = "1", 50);
            }, 800);
        }

        async function handlePlay(isLocal) {
            let q = document.getElementById('search-input').value;
            let vidId = q.includes("v=") ? q.split("v=")[1].split("&")[0] : "";
            if(!vidId && q) {
                const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(q)}&key=${API_KEY}`);
                const data = await res.json();
                if(data.items.length > 0) vidId = data.items[0].id.videoId;
            }
            if(vidId) {
                player.loadVideoById(vidId);
                if(isLocal) {
                    let p = {type: 'play', val: vidId};
                    isHost ? broadcast(p) : connections[0].send(p);
                }
            }
            document.getElementById('search-input').value = "";
        }

        function sendChat() {
            let m = document.getElementById('chat-input').value.trim();
            if(m) {
                let p = {type: 'chat', user: myName, val: m};
                isHost ? broadcast(p) : (connections[0] && connections[0].send(p));
                addMsg("You", m);
                document.getElementById('chat-input').value = "";
            }
        }

        function addMsg(u, t) {
            let b = document.getElementById('messages');
            let cls = u === "System" ? "system-msg" : (u === "You" ? "my-msg" : "other-msg");
            let nameCol = (u === "You") ? "black" : "var(--p)";
            let label = (u === "System") ? `Syncly` : `<b style="color:${nameCol}; font-size:11px;">${u}</b>`;
            b.innerHTML += `<div class="msg ${cls}">${u === "You" || u === "System" ? t : label+"<br>"+t}</div>`;
            b.scrollTop = b.scrollHeight;
        }

        function copyId() { navigator.clipboard.writeText(document.getElementById('room-id-badge').innerText.split(': ')[1]); alert("Room ID Copied!"); }
    </script>
</body>
</html>
