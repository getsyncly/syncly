<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Syncly | Everywhere</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --p: #1DB954; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08); --ease: cubic-bezier(0.4, 0, 0.2, 1); }
        
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; height: 100%; overflow: hidden; }
        .glow { position: fixed; width: 300px; height: 300px; background: var(--p); filter: blur(120px); opacity: 0.1; z-index: -1; top: -50px; right: -50px; }

        /* Welcome Page */
        #entry-page { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: 0.8s var(--ease); padding: 20px; box-sizing: border-box; }
        .hero-title { font-size: clamp(40px, 10vw, 80px); font-weight: 900; letter-spacing: -3px; background: linear-gradient(to bottom, #fff, #444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; text-align: center; }
        .entry-card { background: var(--glass); backdrop-filter: blur(20px); padding: clamp(20px, 5vw, 40px); border-radius: 24px; border: 1px solid var(--glass-border); width: 100%; max-width: 380px; text-align: center; box-sizing: border-box; }

        /* Responsive Layout */
        #main-app { display: none; height: 100vh; grid-template-columns: 1fr 350px; opacity: 0; transition: 1s ease; }
        
        /* Mobile adjustment */
        @media (max-width: 850px) {
            #main-app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
            .player-side { padding: 15px !important; }
            .chat-side { border-left: none !important; border-top: 1px solid var(--glass-border); height: 100%; }
            .hero-title { font-size: 50px; }
        }

        .player-side { padding: 30px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .chat-side { background: rgba(255,255,255,0.01); border-left: 1px solid var(--glass-border); display: flex; flex-direction: column; backdrop-filter: blur(10px); min-height: 0; }

        .video-container { width: 100%; aspect-ratio: 16/9; border-radius: 16px; overflow: hidden; border: 1px solid var(--glass-border); background: #000; position: relative; flex-shrink: 0; }
        #player { position: absolute; inset: 0; width: 100%; height: 100%; }

        .aesthetic-input { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 14px 18px; color: white; border-radius: 14px; outline: none; width: 100%; box-sizing: border-box; font-size: 15px; transition: 0.3s; }
        .aesthetic-input:focus { border-color: var(--p); }

        .btn { border: none; padding: 14px; border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.3s; width: 100%; text-transform: uppercase; font-size: 14px; }
        .primary-btn { background: var(--p); color: black; }

        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 15px; font-size: 13px; max-width: 85%; line-height: 1.4; word-wrap: break-word; }
        .other-msg { background: var(--glass); border: 1px solid var(--glass-border); align-self: flex-start; }
        .my-msg { background: var(--p); color: black; align-self: flex-end; border-radius: 15px 15px 4px 15px; }
        .system-msg { font-size: 10px; color: #555; align-self: center; text-transform: uppercase; letter-spacing: 1px; }

        .room-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        #room-id-badge { background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 40px; border: 1px solid var(--glass-border); font-size: 11px; color: var(--p); font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div class="glow"></div>
    <div id="entry-page">
        <h1 class="hero-title">Syncly</h1>
        <div class="entry-card">
            <input type="text" id="user-name" placeholder="Enter Nickname" class="aesthetic-input">
            <div style="margin-top: 20px;">
                <button class="btn primary-btn" onclick="initPeer(true)">Create New Vibe</button>
                <div style="margin: 15px 0; color: #444; font-size: 10px; font-weight: 800; letter-spacing: 2px;">OR</div>
                <input type="text" id="join-input" placeholder="Paste Room ID" class="aesthetic-input">
                <button class="btn primary-btn" style="background:transparent; border:1px solid var(--glass-border); color:white; margin-top:10px;" onclick="initPeer(false)">Join Room</button>
            </div>
        </div>
    </div>

    <div id="main-app">
        <div class="player-side">
            <div class="room-header">
                <div style="font-size: 20px; font-weight: 900;">Syncly<span style="color:var(--p);">.</span></div>
                <div id="room-id-badge" onclick="copyId()">ID: ...</div>
            </div>
            
            <div style="display:flex; gap:8px; background:var(--glass); padding:6px; border-radius:18px; border: 1px solid var(--glass-border);">
                <input type="text" id="search-input" placeholder="Song or YouTube Link..." class="aesthetic-input" style="margin:0; border:none; background:transparent; text-align:left;">
                <button class="btn primary-btn" style="width:70px; padding:10px; font-size: 12px;" onclick="handlePlay(true)">GO</button>
            </div>

            <div class="video-container">
                <div id="player"></div>
            </div>
        </div>

        <div class="chat-side">
            <div style="padding:15px 20px; border-bottom:1px solid var(--glass-border); font-size:10px; font-weight:900; color:#555; letter-spacing: 1px;">LIVE CHAT</div>
            <div id="messages"></div>
            <div style="padding:15px; border-top:1px solid var(--glass-border); background: rgba(0,0,0,0.2);">
                <input type="text" id="chat-input" placeholder="Message..." class="aesthetic-input" style="margin:0; text-align:left; border-radius: 25px;" onkeypress="if(event.key==='Enter') sendChat()">
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyAaCRqzXizB5wt8iFc7O-yfFvherdJi_-I'; // <--- BHAI KEY ZAROOR DAALNA
        let peer, connections = [], player, isHost = false, myName = "", ignoreNextUpdate = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%', videoId: 'jOTfBlKSQ84',
                playerVars: { 'autoplay': 0, 'controls': 1, 'rel': 0, 'playsinline': 1 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerStateChange(event) {
            if (ignoreNextUpdate) { ignoreNextUpdate = false; return; }
            let state = event.data;
            let time = player.getCurrentTime();
            if (state === YT.PlayerState.PLAYING || state === YT.PlayerState.PAUSED) {
                let p = { type: 'sync', state: state, time: time };
                isHost ? broadcast(p) : (connections[0] && connections[0].send(p));
            }
        }

        function initPeer(hostMode) {
            myName = document.getElementById('user-name').value.trim();
            if(!myName) return alert("Nickname daalo bhai!");
            isHost = hostMode;
            const shortId = isHost ? Math.random().toString(36).substring(2, 7) : null;
            peer = new Peer(shortId);
            peer.on('open', (id) => {
                document.getElementById('room-id-badge').innerText = "ID: " + id;
                if(!isHost) connectToHost(document.getElementById('join-input').value.trim());
                showApp();
            });
            peer.on('connection', (conn) => { connections.push(conn); setupListeners(conn); });
        }

        function connectToHost(id) {
            let conn = peer.connect(id, { reliable: true });
            connections.push(conn);
            setupListeners(conn);
        }

        function setupListeners(conn) {
            conn.on('data', (data) => {
                if(data.type === 'chat') addMsg(data.user, data.val);
                if(data.type === 'play') { player.loadVideoById(data.val); if(isHost) broadcast(data, conn); }
                if(data.type === 'sync') {
                    ignoreNextUpdate = true;
                    player.seekTo(data.time);
                    data.state === YT.PlayerState.PLAYING ? player.playVideo() : player.pauseVideo();
                    if(isHost) broadcast(data, conn);
                }
                if(data.type === 'system') { addMsg("System", data.val); if(isHost) broadcast(data, conn); }
            });
            conn.on('open', () => conn.send({type: 'system', val: myName + " joined!"}));
        }

        function broadcast(data, exclude) { connections.forEach(c => { if(c.open && c !== exclude) c.send(data); }); }

        function showApp() {
            document.getElementById('entry-page').style.transform = "translateY(-100%)";
            setTimeout(() => {
                document.getElementById('entry-page').style.display = "none";
                document.getElementById('main-app').style.display = "grid";
                setTimeout(() => document.getElementById('main-app').style.opacity = "1", 50);
            }, 800);
        }

        async function handlePlay(isLocal) {
            let q = document.getElementById('search-input').value;
            let vidId = q.includes("v=") ? q.split("v=")[1].split("&")[0] : "";
            if(!vidId && q) {
                const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(q)}&key=${API_KEY}`);
                const data = await res.json();
                if(data.items.length > 0) vidId = data.items[0].id.videoId;
            }
            if(vidId) {
                player.loadVideoById(vidId);
                if(isLocal) {
                    let p = {type: 'play', val: vidId};
                    isHost ? broadcast(p) : connections[0].send(p);
                }
            }
            document.getElementById('search-input').value = "";
        }

        function sendChat() {
            let m = document.getElementById('chat-input').value;
            if(m) {
                let p = {type: 'chat', user: myName, val: m};
                isHost ? broadcast(p) : (connections[0] && connections[0].send(p));
                addMsg("You", m);
                document.getElementById('chat-input').value = "";
            }
        }

        function addMsg(u, t) {
            let b = document.getElementById('messages');
            let cls = u === "System" ? "system-msg" : (u === "You" ? "my-msg" : "other-msg");
            let nameCol = (u === "You") ? "black" : "var(--p)";
            let label = (u === "System") ? `Syncly` : `<b style="color:${nameCol}; font-size:11px;">${u}</b>`;
            b.innerHTML += `<div class="msg ${cls}">${u === "You" || u === "System" ? t : label+"<br>"+t}</div>`;
            b.scrollTop = b.scrollHeight;
        }

        function copyId() { navigator.clipboard.writeText(document.getElementById('room-id-badge').innerText.split(': ')[1]); alert("ID Copied!"); }
    </script>
</body>
</html>
