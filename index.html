<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syncly | Synchronized Music Experience</title>
    <meta name="description" content="Syncly lets you listen to music and watch videos with friends in perfect sync.">
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <style>
        :root { 
            --p: #1DB954; 
            --bg: #050505; 
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Inter', -apple-system, sans-serif; height: 100vh; overflow: hidden; }
        
        /* Glass Glow Background */
        .glow { position: fixed; width: 500px; height: 500px; background: var(--p); filter: blur(180px); opacity: 0.07; z-index: -1; top: -150px; right: -150px; }

        /* ENTRANCE PAGE */
        #entry-page { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: 1s var(--ease); }
        .hero-title { font-size: 90px; font-weight: 900; letter-spacing: -5px; color: white; margin: 0; }
        .hero-title span { color: var(--p); }
        
        .entry-card { background: var(--glass); backdrop-filter: blur(25px); padding: 50px; border-radius: 40px; border: 1px solid var(--glass-border); width: 400px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }

        .aesthetic-input { background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); padding: 18px 24px; color: white; border-radius: 20px; outline: none; width: -webkit-fill-available; margin-bottom: 15px; font-size: 16px; text-align: center; transition: 0.3s; }
        .aesthetic-input:focus { border-color: var(--p); background: rgba(0,0,0,0.6); }

        .btn { border: none; padding: 18px; border-radius: 20px; font-weight: 800; cursor: pointer; transition: 0.4s var(--ease); width: 100%; text-transform: uppercase; letter-spacing: 2px; font-size: 14px; }
        .primary-btn { background: var(--p); color: black; box-shadow: 0 10px 30px rgba(29, 185, 84, 0.2); }
        .primary-btn:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(29, 185, 84, 0.4); }
        .secondary-btn { background: transparent; border: 1px solid var(--glass-border); color: white; margin-top: 15px; }
        .secondary-btn:hover { background: var(--glass-border); }

        /* MAIN INTERFACE */
        #main-app { display: none; height: 100vh; grid-template-columns: 1fr 380px; opacity: 0; transition: 1.5s ease; }
        .player-side { padding: 40px; display: flex; flex-direction: column; gap: 25px; }
        .chat-side { background: rgba(0,0,0,0.4); border-left: 1px solid var(--glass-border); display: flex; flex-direction: column; backdrop-filter: blur(20px); }

        .video-container { flex: 1; position: relative; border-radius: 30px; overflow: hidden; border: 1px solid var(--glass-border); background: #000; box-shadow: 0 50px 100px -20px rgba(0,0,0,0.8); }
        #player { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

        /* CHAT BUBBLES */
        #messages { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 14px 20px; border-radius: 22px; font-size: 14px; max-width: 80%; line-height: 1.6; animation: fadeIn 0.3s ease; }
        .other-msg { background: var(--glass); border: 1px solid var(--glass-border); align-self: flex-start; border-bottom-left-radius: 5px; }
        .my-msg { background: var(--p); color: black; align-self: flex-end; border-bottom-right-radius: 5px; font-weight: 600; }
        
        @keyframes fadeIn { from { opacity:0; transform: translateY(5px); } to { opacity:1; transform: translateY(0); } }

        #room-id-badge { background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--glass-border); font-size: 12px; font-weight: 800; color: var(--p); cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="glow"></div>
    <div id="entry-page">
        <h1 class="hero-title">Syncly<span>.</span></h1>
        <p style="color: #666; font-weight: 500; margin-bottom: 40px; letter-spacing: 1px;">THE PREMIUM SYNC EXPERIENCE</p>
        <div class="entry-card">
            <input type="text" id="user-name" placeholder="YOUR NICKNAME" class="aesthetic-input">
            <div style="margin-top: 10px;">
                <button class="btn primary-btn" onclick="initPeer(true)">CREATE LOUNGE</button>
                <div style="margin: 25px 0; font-size: 11px; color: #333; font-weight: 900; letter-spacing: 3px;">OR JOIN EXISTING</div>
                <input type="text" id="join-input" placeholder="LOUNGE ID" class="aesthetic-input">
                <button class="btn secondary-btn" onclick="initPeer(false)">ENTER ROOM</button>
            </div>
        </div>
    </div>

    <div id="main-app">
        <div class="player-side">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="font-size: 28px; font-weight: 900; letter-spacing: -1.5px;">Syncly<span style="color:var(--p);">.</span></div>
                <div id="room-id-badge" onclick="copyId()">ID: LOADING...</div>
            </div>
            
            <div style="display:flex; gap:12px; background:var(--glass); padding:10px; border-radius:25px; border:1px solid var(--glass-border);">
                <input type="text" id="search-input" placeholder="Search track or paste YouTube URL..." class="aesthetic-input" style="margin:0; border:none; background:transparent; text-align: left; font-size: 14px;">
                <button class="btn primary-btn" style="width:120px; padding:15px; border-radius: 18px;" onclick="handlePlay(true)">PLAY</button>
            </div>

            <div class="video-container">
                <div id="player"></div>
            </div>
        </div>

        <div class="chat-side">
            <div style="padding:30px; border-bottom:1px solid var(--glass-border); font-size: 12px; font-weight: 900; letter-spacing: 3px; color: #444;">LIVE LOUNGE</div>
            <div id="messages"></div>
            <div style="padding:25px; border-top:1px solid var(--glass-border);">
                <input type="text" id="chat-input" placeholder="Send a message..." class="aesthetic-input" style="margin:0; text-align:left; border-radius: 25px; background: rgba(255,255,255,0.02);" onkeypress="if(event.key==='Enter') sendChat()">
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyAaCRqzXizB5wt8iFc7O-yfFvherdJi_-I'; 
        let peer, connections = [], player, isHost = false, myName = "", ignoreNext = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%', videoId: 'jOTfBlKSQ84',
                playerVars: { 'autoplay': 0, 'controls': 1, 'rel': 0, 'playsinline': 1 },
                events: { 'onStateChange': onStateChange }
            });
        }

        function onStateChange(event) {
            if(ignoreNext) { ignoreNext = false; return; }
            if(event.data === YT.PlayerState.PLAYING || event.data === YT.PlayerState.PAUSED) {
                let sync = { type: 'sync', state: event.data, time: player.getCurrentTime() };
                isHost ? broadcast(sync) : (connections[0] && connections[0].send(sync));
            }
        }

        function initPeer(hostMode) {
            myName = document.getElementById('user-name').value.trim();
            if(!myName) return alert("Nickname is required.");
            isHost = hostMode;
            const rid = isHost ? Math.random().toString(36).substring(2, 7) : null;
            peer = new Peer(rid);
            peer.on('open', id => {
                document.getElementById('room-id-badge').innerText = "ID: " + id;
                if(!isHost) connectToHost(document.getElementById('join-input').value.trim());
                showApp();
            });
            peer.on('connection', c => { connections.push(c); listen(c); });
        }

        function connectToHost(id) { let c = peer.connect(id); connections.push(c); listen(c); }

        function listen(conn) {
            conn.on('data', data => {
                if(data.type === 'chat') addMsg(data.user, data.val);
                if(data.type === 'play') { player.loadVideoById(data.val); if(isHost) broadcast(data, conn); }
                if(data.type === 'sync') {
                    ignoreNext = true;
                    player.seekTo(data.time);
                    data.state === 1 ? player.playVideo() : player.pauseVideo();
                    if(isHost) broadcast(data, conn);
                }
            });
            conn.on('open', () => conn.send({type: 'chat', user: 'System', val: myName + " entered the lounge."}));
        }

        function broadcast(d, exc) { connections.forEach(c => { if(c.open && c !== exc) c.send(d); }); }

        function showApp() {
            document.getElementById('entry-page').style.transform = "scale(1.1)";
            document.getElementById('entry-page').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('entry-page').style.display = "none";
                document.getElementById('main-app').style.display = "grid";
                setTimeout(() => document.getElementById('main-app').style.opacity = "1", 50);
            }, 800);
        }

        async function handlePlay(isLocal) {
            let q = document.getElementById('search-input').value;
            let vidId = q.includes("v=") ? q.split("v=")[1].split("&")[0] : "";
            if(!vidId && q) {
                const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(q)}&key=${API_KEY}`);
                const data = await res.json();
                if(data.items.length > 0) vidId = data.items[0].id.videoId;
            }
            if(vidId) {
                player.loadVideoById(vidId);
                if(isLocal) {
                    let p = {type: 'play', val: vidId};
                    isHost ? broadcast(p) : connections[0].send(p);
                }
            }
            document.getElementById('search-input').value = "";
        }

        function sendChat() {
            let m = document.getElementById('chat-input').value.trim();
            if(m) {
                let p = {type: 'chat', user: myName, val: m};
                isHost ? broadcast(p) : (connections[0] && connections[0].send(p));
                addMsg("You", m);
                document.getElementById('chat-input').value = "";
            }
        }

        function addMsg(u, t) {
            let b = document.getElementById('messages');
            let cls = u === "You" ? "my-msg" : "other-msg";
            let label = (u === "You" || u === "System") ? "" : `<b style="color:var(--p); font-size:11px; text-transform:uppercase;">${u}</b><br>`;
            b.innerHTML += `<div class="msg ${cls}">${label}${t}</div>`;
            b.scrollTop = b.scrollHeight;
        }

        function copyId() { 
            let id = document.getElementById('room-id-badge').innerText.split(': ')[1];
            navigator.clipboard.writeText(id); 
            alert("Lounge ID Copied!"); 
        }
    </script>
</body>
</html>
