<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Syncly | Multi-Device Sync</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --p: #1DB954; --bg: #0b0b0b; --panel: #121212; --brd: #282828; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }
        
        /* Entrance Page */
        #entry-page { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .entry-card { background: var(--panel); padding: 40px; border-radius: 20px; border: 1px solid var(--brd); width: 350px; text-align: center; box-shadow: 0 10px 50px rgba(0,0,0,0.5); }
        
        /* Main App */
        #main-app { display: none; height: 100vh; display: grid; grid-template-columns: 3fr 1fr; }
        .player-side { padding: 20px; display: flex; flex-direction: column; gap: 15px; border-right: 1px solid var(--brd); }
        .chat-side { background: var(--panel); display: flex; flex-direction: column; }

        .video-container { flex: 1; width: 100%; position: relative; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid var(--brd); }
        #main-player { position: absolute; top:0; left:0; width: 100%; height: 100%; border: none; }

        input { background: #1e1e1e; border: 1px solid var(--brd); padding: 12px; color: white; border-radius: 8px; outline: none; width: -webkit-fill-available; }
        .btn { background: var(--p); border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; transition: 0.2s; }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }

        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #222; padding: 8px 12px; border-radius: 8px; border-left: 3px solid var(--p); font-size: 14px; align-self: flex-start; max-width: 80%; }
    </style>
</head>
<body>

    <div id="entry-page">
        <h1 style="color:var(--p); font-size: 50px; margin-bottom:10px;">Syncly</h1>
        <p style="color:#666; margin-bottom:30px;">Vibe with your whole squad.</p>
        <div class="entry-card">
            <button class="btn" style="width:100%; font-size:16px;" onclick="initPeer(true)">CREATE ROOM</button>
            <div style="margin: 25px 0; color: #444; font-weight: bold;">OR</div>
            <input type="text" id="join-input" placeholder="Enter Short Room ID">
            <button class="btn" style="width:100%; background:#333; color:white; margin-top:10px;" onclick="initPeer(false)">JOIN ROOM</button>
        </div>
    </div>

    <div id="main-app">
        <div class="player-side">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="color:var(--p); margin:0;">Syncly</h2>
                <div id="room-id-tag" style="background:var(--p); color:black; padding:6px 15px; border-radius:20px; font-weight:bold; font-size:14px;">Connecting...</div>
            </div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="search-input" placeholder="Search song or paste YouTube link...">
                <button class="btn" onclick="handlePlay(true)">PLAY</button>
            </div>
            <div class="video-container">
                <iframe id="main-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>

        <div class="chat-side">
            <div style="padding:15px; border-bottom:1px solid var(--brd); font-weight:bold; color:var(--p);">LIVE CHAT</div>
            <div id="messages"></div>
            <div style="padding:15px; border-top:1px solid var(--brd); display:flex; gap:5px;">
                <input type="text" id="chat-input" placeholder="Message..." onkeypress="if(event.key==='Enter') sendChat()">
                <button class="btn" onclick="sendChat()">></button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyAaCRqzXizB5wt8iFc7O-yfFvherdJi_-I'; // <--- APNI KEY YAHAN DAAL
        let peer, connections = [];
        let isHost = false;

        function initPeer(hostMode) {
            isHost = hostMode;
            // Short ID Generate karne ke liye random string (5 chars)
            const shortId = isHost ? Math.random().toString(36).substring(2, 7) : null;
            
            peer = new Peer(shortId);

            peer.on('open', (id) => {
                document.getElementById('room-id-tag').innerText = "ROOM ID: " + id;
                if(!isHost) {
                    let target = document.getElementById('join-input').value.trim();
                    connectToHost(target);
                }
                showApp();
            });

            peer.on('connection', (conn) => {
                connections.push(conn);
                setupListeners(conn);
            });

            peer.on('error', (err) => {
                alert("ID error! Try again or check if ID exists.");
                location.reload();
            });
        }

        function connectToHost(id) {
            let conn = peer.connect(id, { reliable: true });
            connections.push(conn);
            setupListeners(conn);
        }

        function setupListeners(conn) {
            conn.on('open', () => {
                addMsg("System", "New member joined the vibe!");
                setInterval(() => { if(conn.open) conn.send({type: 'ping'}); }, 5000);
            });

            conn.on('data', (data) => {
                if(data.type === 'chat') {
                    addMsg("Friend", data.val);
                    // Host will forward message to everyone else
                    if(isHost) broadcast({type: 'chat', val: data.val}, conn);
                }
                if(data.type === 'play') {
                    updatePlayer(data.val);
                    if(isHost) broadcast({type: 'play', val: data.val}, conn);
                }
            });
        }

        function broadcast(data, excludeConn) {
            connections.forEach(c => {
                if(c.open && c !== excludeConn) c.send(data);
            });
        }

        function showApp() {
            document.getElementById('entry-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'grid';
        }

        async function handlePlay(isLocal) {
            let q = document.getElementById('search-input').value;
            if(!q) return;

            let vidId = "";
            if(q.includes("v=")) vidId = q.split("v=")[1].split("&")[0];
            else {
                const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(q)}&key=${API_KEY}`);
                const data = await res.json();
                vidId = data.items[0].id.videoId;
            }

            if(vidId) {
                updatePlayer(vidId);
                if(isLocal) {
                    let payload = {type: 'play', val: vidId};
                    isHost ? broadcast(payload) : connections[0].send(payload);
                }
            }
        }

        function updatePlayer(id) {
            document.getElementById('main-player').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
        }

        function sendChat() {
            let m = document.getElementById('chat-input').value;
            if(m) {
                let payload = {type: 'chat', val: m};
                isHost ? broadcast(payload) : (connections[0] && connections[0].send(payload));
                addMsg("You", m);
                document.getElementById('chat-input').value = "";
            }
        }

        function addMsg(u, t) {
            let b = document.getElementById('messages');
            b.innerHTML += `<div class="msg"><b>${u}:</b> ${t}</div>`;
            b.scrollTop = b.scrollHeight;
        }
    </script>
</body>
</html>
